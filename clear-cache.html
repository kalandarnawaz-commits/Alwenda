<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Refresh Alwenda</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f4ef;
        color: #111;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(17, 17, 17, 0.08);
        border-radius: 28px;
        box-shadow: 0 24px 70px rgba(17, 17, 17, 0.1);
        margin: 0 auto;
        max-width: 520px;
        padding: 32px;
      }

      h1 {
        font-size: clamp(32px, 8vw, 48px);
        letter-spacing: -0.04em;
        line-height: 0.96;
        margin: 0 0 16px;
      }

      p {
        color: #5b5b56;
        font-size: 16px;
        line-height: 1.55;
        margin: 0 0 24px;
      }

      button,
      a {
        align-items: center;
        background: #111;
        border: 0;
        border-radius: 999px;
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 750;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        text-decoration: none;
      }

      small {
        color: #77736c;
        display: block;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Refreshing Alwenda</h1>
      <p id="status">Clearing old local app files so the latest task-detail navigation can load.</p>
      <button id="retry" type="button">Refresh now</button>
      <small>If this page does not move automatically, tap Refresh now.</small>
    </main>
    <script>
      async function resetAlwenda() {
        const status = document.getElementById("status");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          status.textContent = "Done. Opening the fresh Alwenda build now.";
          window.location.replace(`./?v=live-opportunity-detail-2-cleared-${Date.now()}`);
        } catch (error) {
          status.textContent = "Could not clear automatically. Please close this tab and hard refresh Alwenda.";
        }
      }

      document.getElementById("retry").addEventListener("click", resetAlwenda);
      resetAlwenda();
    </script>
  </body>
</html>
